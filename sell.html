<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بيع معنا - PriceHub</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
direction:rtl;
}

.box{
background:white;
max-width:500px;
margin:auto;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center;
}

input,select,textarea,button{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
box-sizing:border-box;
}

button{
background:#0066ff;
color:white;
border:none;
cursor:pointer;
}

.note{
background:#fff3cd;
padding:10px;
border-radius:10px;
margin:10px 0;
font-weight:bold;
}
</style>
</head>

<body>

<div class="box">

<h1>🛍️ بيع معنا</h1>

<p>أرسل منتجك، وسيتم مراجعته قبل ظهوره في الموقع.</p>

<div class="note">
💡 نشر المنتج مجاني حالياً، وسيتم مراجعته قبل النشر.
</div>

<a href="index.html">
<button type="button">⬅️ العودة للرئيسية</button>
</a>

<input id="sellerName" placeholder="اسم البائع">
<input id="sellerPhone" placeholder="رقم الهاتف">

<input id="productName" placeholder="اسم المنتج">
<input id="productPrice" type="number" placeholder="السعر بالدولار">
<input id="productStock" type="number" placeholder="الكمية المتوفرة">

<input id="productImage" placeholder="رابط صورة المنتج">

<select id="productCategory">
<option value="phone">هواتف</option>
<option value="gaming">ألعاب</option>
<option value="laptop">لابتوبات</option>
<option value="other">أخرى</option>
</select>

<textarea id="productDescription" placeholder="وصف المنتج"></textarea>

<button onclick="submitProduct()">إرسال المنتج للمراجعة</button>

<p id="message"></p>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA4jGrncraaaktuaDpsO7nz1-qmrqYKM3k",
authDomain: "pricehub-6d3c4.firebaseapp.com",
projectId: "pricehub-6d3c4",
storageBucket: "pricehub-6d3c4.firebasestorage.app",
messagingSenderId: "991179979836",
appId: "1:991179979836:web:cb23f4d31e55364d1ed739",
measurementId: "G-HLCHBX5FF7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.submitProduct = async function(){

const sellerName = document.getElementById("sellerName").value.trim();
const sellerPhone = document.getElementById("sellerPhone").value.trim();
const name = document.getElementById("productName").value.trim();
const price = Number(document.getElementById("productPrice").value);
const stock = Number(document.getElementById("productStock").value);
const image = document.getElementById("productImage").value.trim();
const category = document.getElementById("productCategory").value;
const description = document.getElementById("productDescription").value.trim();
const message = document.getElementById("message");

message.innerHTML = "";

if(!sellerName || !sellerPhone || !name || !price || stock < 0 || !image){
message.innerHTML = "املأ كل الحقول المطلوبة";
return;
}

if(price <= 0){
message.innerHTML = "السعر يجب أن يكون أكبر من 0";
return;
}

if(stock < 0){
message.innerHTML = "الكمية لا يمكن أن تكون أقل من 0";
return;
}

try{

await addDoc(collection(db,"pendingProducts"),{
sellerName,
sellerPhone,
name,
price,
stock,
image,
category,
description,
rating: 5,
featured: false,
sellerRating: 5,
sellerProducts: 1,
stores: [sellerName + " : $" + price],
status: "pending",
statusText: "قيد المراجعة",
date: new Date().toLocaleString()
});

message.innerHTML = "✅ تم إرسال المنتج للمراجعة";

document.getElementById("sellerName").value = "";
document.getElementById("sellerPhone").value = "";
document.getElementById("productName").value = "";
document.getElementById("productPrice").value = "";
document.getElementById("productStock").value = "";
document.getElementById("productImage").value = "";
document.getElementById("productDescription").value = "";

}catch(error){
console.error(error);
message.innerHTML = "❌ فشل إرسال المنتج، تأكد من Firebase Rules";
}

};

</script>

</body>
</html>
