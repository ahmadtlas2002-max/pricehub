<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>العروض المميزة - PriceHub</title>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px;direction:rtl;}
.box{max-width:900px;margin:auto;}
.card{background:white;padding:15px;margin:15px 0;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,.1);}
.card img{width:100%;max-height:220px;object-fit:cover;border-radius:12px;background:#ddd;}
button{width:100%;padding:12px;margin:8px 0;border:none;border-radius:8px;background:#0066ff;color:white;font-size:16px;cursor:pointer;}
input{width:100%;padding:12px;margin:10px 0;border-radius:8px;border:1px solid #ccc;font-size:16px;box-sizing:border-box;}
.price{color:green;font-size:22px;font-weight:bold;}
.badge{display:inline-block;background:#fff3cd;padding:6px 10px;border-radius:20px;font-weight:bold;margin:5px 0;}
.info{background:#f1f1f1;padding:10px;border-radius:10px;margin-top:10px;}
.out{color:red;font-weight:bold;}
.in{color:green;font-weight:bold;}
.low{color:#ff9800;font-weight:bold;}
</style>
</head>

<body>

<div class="box">
<h1>🔥 العروض المميزة</h1>

<a href="index.html">
<button>⬅️ العودة للرئيسية</button>
</a>

<h3 id="offersCount">عدد العروض: 0</h3>

<input id="offerSearch" placeholder="🔍 ابحث داخل العروض...">

<div id="offersList">جاري التحميل...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA4jGrncraaaktuaDpsO7nz1-qmrqYKM3k",
authDomain: "pricehub-6d3c4.firebaseapp.com",
projectId: "pricehub-6d3c4",
storageBucket: "pricehub-6d3c4.appspot.com",
messagingSenderId: "991179979836",
appId: "1:991179979836:web:cb23f4d31e55364d1ed739",
measurementId: "G-HLCHBX5FF7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allOffers = [];

function getStockText(stock){
stock = Number(stock || 0);

if(stock <= 0){
return "<span class='out'>غير متوفر</span>";
}

if(stock <= 5){
return "<span class='low'>" + stock + " - مخزون منخفض</span>";
}

return "<span class='in'>" + stock + " - متوفر</span>";
}

function getConditionText(condition){
return condition === "used" ? "مستعمل" : "جديد";
}

function renderOffers(offers){
const box = document.getElementById("offersList");

box.innerHTML = "";

document.getElementById("offersCount").innerHTML =
"عدد العروض: " + offers.length;

if(offers.length === 0){
box.innerHTML = "<p>لا توجد عروض مطابقة</p>";
return;
}

offers.forEach(product=>{
box.innerHTML += `
<div class="card">

<img src="${product.image || 'https://picsum.photos/300/200'}">

<h2>${product.name || "منتج بدون اسم"}</h2>

${product.featured ? "<div class='badge'>⭐ منتج مميز</div>" : ""}

<p class="price">$${product.price || 0}</p>

<div class="info">
<p>🏪 المتجر: ${product.storeName || "غير محدد"}</p>
<p>👤 البائع: ${product.sellerName || "غير محدد"}</p>
<p>📍 المدينة: ${product.sellerCity || "غير محددة"}</p>
<p>⭐ حالة المنتج: ${getConditionText(product.condition)}</p>
<p>📦 المخزون: ${getStockText(product.stock)}</p>
<p>⭐ التقييم: ${product.rating || 0} / 5</p>
</div>

<p>${product.description || ""}</p>

</div>
`;
});
}

async function loadOffers(){
const box = document.getElementById("offersList");
box.innerHTML = "جاري التحميل...";

const snapshot = await getDocs(collection(db,"products"));
allOffers = [];

snapshot.forEach(doc=>{
const product = {id:doc.id,...doc.data()};

if(product.featured === true){
allOffers.push(product);
}
});

allOffers.sort((a,b)=> Number(b.rating || 0) - Number(a.rating || 0));

renderOffers(allOffers);
}

document.getElementById("offerSearch").addEventListener("input",function(){
const text = this.value.toLowerCase().trim();

const filtered = allOffers.filter(product =>
(product.name || "").toLowerCase().includes(text) ||
(product.storeName || "").toLowerCase().includes(text) ||
(product.sellerName || "").toLowerCase().includes(text) ||
(product.sellerCity || "").toLowerCase().includes(text) ||
(product.category || "").toLowerCase().includes(text)
);

renderOffers(filtered);
});

loadOffers();
</script>

</body>
</html>
