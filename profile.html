<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حسابي - PriceHub</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
direction:rtl;
}

.box{
background:white;
max-width:500px;
margin:auto;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

button{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
background:#0066ff;
color:white;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:.9;
}

#memberBadge{
background:#fff3cd;
padding:10px;
border-radius:10px;
font-weight:bold;
margin:10px 0;
}

.infoBox{
background:#eef;
padding:12px;
border-radius:10px;
margin:10px 0;
}

.pointsBox{
background:#e8f5e9;
padding:12px;
border-radius:10px;
margin-top:10px;
font-weight:bold;
}

.message{
font-weight:bold;
margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

<h1>👤 حسابي</h1>

<p id="userEmail">جاري التحقق...</p>
<p id="memberBadge">🥉 عضو جديد</p>
<p id="ordersCount">📦 عدد الطلبات: 0</p>

<div id="latestOrderStatus" class="infoBox">
جاري تحميل بيانات الحساب...
</div>

<button onclick="trackLatestOrder()" style="background:#673ab7;">
📦 تتبع آخر طلب
</button>

<div id="userPoints" class="pointsBox">
🏆 نقاطك: 0
</div>

<button onclick="redeemPoints()" style="background:#009688;">
🎁 استبدال 500 نقطة بكوبون خصم
</button>

<p id="redeemMessage" class="message"></p>

<p id="favCountProfile">❤️ المفضلة: 0</p>

<a href="myorders.html">
<button>📦 طلباتي</button>
</a>

<a href="login.html">
<button style="background:#ff9800;">🔐 تسجيل الدخول</button>
</a>

<a href="index.html">
<button>🏠 العودة للرئيسية</button>
</a>

<button onclick="logoutProfile()" style="background:#cc0000;">
🚪 تسجيل الخروج
</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyA4jGrncraaaktuaDpsO7nz1-qmrqYKM3k",
authDomain: "pricehub-6d3c4.firebaseapp.com",
projectId: "pricehub-6d3c4",
storageBucket: "pricehub-6d3c4.appspot.com",
messagingSenderId: "991179979836",
appId: "1:991179979836:web:cb23f4d31e55364d1ed739",
measurementId: "G-HLCHBX5FF7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let userPointsValue = 0;
let latestOrderId = "";
let currentUserEmail = "";

const favs = JSON.parse(localStorage.getItem("favorites")) || [];

document.getElementById("favCountProfile").innerHTML =
"❤️ المفضلة: " + favs.length;

function setMemberBadge(points){
if(points >= 1000){
document.getElementById("memberBadge").innerHTML = "🥇 عضو ذهبي";
}else if(points >= 500){
document.getElementById("memberBadge").innerHTML = "🥈 عضو فضي";
}else if(points >= 100){
document.getElementById("memberBadge").innerHTML = "🥉 عضو برونزي";
}else{
document.getElementById("memberBadge").innerHTML = "🥉 عضو جديد";
}
}

function getStatusColor(status){
if(status === "قيد المعالجة"){
return "#ff9800";
}

if(status === "تم التسليم"){
return "#28a745";
}

if(status === "مدفوع"){
return "#673ab7";
}

return "#2196f3";
}

window.logoutProfile = async function(){
try{
await signOut(auth);
localStorage.removeItem("userEmail");
window.location.href = "login.html";
}catch(error){
alert("حدث خطأ أثناء تسجيل الخروج");
}
};

onAuthStateChanged(auth, async(user)=>{

if(!user){
currentUserEmail = "";
latestOrderId = "";
userPointsValue = 0;

document.getElementById("userEmail").innerHTML = "غير مسجل الدخول";
document.getElementById("ordersCount").innerHTML = "📦 عدد الطلبات: 0";
document.getElementById("latestOrderStatus").innerHTML = `
⚠️ سجّل الدخول لعرض طلباتك ونقاطك

<a href="login.html">
<button type="button">تسجيل الدخول</button>
</a>
`;
document.getElementById("userPoints").innerHTML = "🏆 نقاطك: 0";
document.getElementById("memberBadge").innerHTML = "🥉 عضو جديد";
return;
}

currentUserEmail = user.email;
localStorage.setItem("userEmail", user.email);

document.getElementById("userEmail").innerHTML = "📧 " + user.email;
document.getElementById("latestOrderStatus").innerHTML = "⏳ جاري تحميل آخر طلب...";

try{
const snapshot = await getDocs(collection(db,"orders"));

let count = 0;
let totalSpent = 0;
let latestOrder = null;

snapshot.forEach(doc=>{
const order = doc.data();

if(order.customerEmail === user.email){
count++;
totalSpent += Number(order.total || 0);

if(!latestOrder || new Date(order.date) > new Date(latestOrder.date)){
latestOrder = order;
}
}
});

document.getElementById("ordersCount").innerHTML =
"📦 عدد الطلبات: " + count;

userPointsValue = Math.floor(totalSpent);

document.getElementById("userPoints").innerHTML =
"🏆 نقاطك: " + userPointsValue;

setMemberBadge(userPointsValue);

if(latestOrder){
latestOrderId = latestOrder.orderId || "";

const status = latestOrder.status || "جديد";
const statusColor = getStatusColor(status);

document.getElementById("latestOrderStatus").innerHTML =
"🔔 آخر طلب: " + (latestOrder.orderId || "غير موجود") +
"<br><span style='display:inline-block;margin-top:8px;padding:6px 12px;border-radius:8px;color:white;background:" + statusColor + ";'>" +
status +
"</span>";

}else{
latestOrderId = "";
document.getElementById("latestOrderStatus").innerHTML =
"لا توجد إشعارات طلبات";
}

}catch(error){
console.error(error);
document.getElementById("latestOrderStatus").innerHTML =
"<span style='color:red;'>حدث خطأ في تحميل الطلبات. تأكد من Firebase Rules.</span>";
}

});

window.redeemPoints = async function(){

const redeemMessage = document.getElementById("redeemMessage");

if(!currentUserEmail){
redeemMessage.innerHTML = "⚠️ سجل الدخول أولاً";
redeemMessage.style.color = "red";
return;
}

if(userPointsValue < 500){
redeemMessage.innerHTML = "تحتاج 500 نقطة على الأقل";
redeemMessage.style.color = "red";
return;
}

const coupon = "LOYAL" + Math.floor(Math.random() * 10000);

try{
await addDoc(collection(db,"coupons"),{
code: coupon,
discount: 10,
email: currentUserEmail,
date: new Date().toLocaleString()
});

redeemMessage.innerHTML =
"🎉 كوبونك: " + coupon + "<br>تم حفظه ويعمل الآن في السلة بخصم 10%";

redeemMessage.style.color = "green";

}catch(error){
console.error(error);
redeemMessage.innerHTML =
"حدث خطأ أثناء إنشاء الكوبون. تأكد من Firebase Rules.";
redeemMessage.style.color = "red";
}
};

window.trackLatestOrder = function(){

if(!latestOrderId){
alert("لا يوجد طلب لتتبعه");
return;
}

window.location.href = "track.html?orderId=" + encodeURIComponent(latestOrderId);

};
</script>

</body>
</html>
