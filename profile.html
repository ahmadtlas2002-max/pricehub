<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حسابي - PriceHub</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
direction:rtl;
}

.box{
background:white;
max-width:500px;
margin:auto;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

button{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
background:#0066ff;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

#memberBadge{
background:#fff3cd;
padding:10px;
border-radius:10px;
font-weight:bold;
margin:10px 0;
}
</style>
</head>

<body>

<div class="box">

<h1>👤 حسابي</h1>

<p id="userEmail">غير مسجل الدخول</p>

<p id="memberBadge">🥉 عضو جديد</p>

<p id="ordersCount">📦 عدد الطلبات: 0</p>

<p id="favCountProfile">❤️ المفضلة: 0</p>

<a href="myorders.html">
<button>📦 طلباتي</button>
</a>

<a href="index.html">
<button>🏠 العودة للرئيسية</button>
</a>

<button onclick="logoutProfile()" style="background:#cc0000;">
🚪 تسجيل الخروج
</button>

</div>

<script>
const email = localStorage.getItem("userEmail");

if(email){
document.getElementById("userEmail").innerHTML =
"📧 " + email;
}

function logoutProfile(){
localStorage.removeItem("userEmail");
window.location.href = "login.html";
}

const favs = JSON.parse(localStorage.getItem("favorites")) || [];

document.getElementById("favCountProfile").innerHTML =
"❤️ المفضلة: " + favs.length;

const orders = JSON.parse(localStorage.getItem("myOrders")) || [];

document.getElementById("ordersCount").innerHTML =
"📦 عدد الطلبات: " + orders.length;

if(favs.length >= 5){
document.getElementById("memberBadge").innerHTML =
"🥈 عضو نشط";
}

if(favs.length >= 10){
document.getElementById("memberBadge").innerHTML =
"🥇 عضو مميز";
}
</script>

</body>
</html>
