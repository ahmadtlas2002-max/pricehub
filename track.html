<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تتبع الطلب - PriceHub</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
direction:rtl;
}

.box{
background:white;
max-width:500px;
margin:auto;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,button{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#0066ff;
color:white;
border:none;
cursor:pointer;
}

.order-card{
background:#eee;
padding:12px;
margin:10px 0;
border-radius:10px;
}
</style>
</head>

<body>

<div class="box">
<h1>📦 تتبع الطلب</h1>

<a href="index.html">
<button>⬅️ العودة للموقع</button>
</a>

<input id="phone" placeholder="اكتب رقم الهاتف">
<input id="orderId" placeholder="أو رقم الطلب">
<button onclick="trackOrder()">تتبع الطلب</button>

<div id="result"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA4jGrncraaaktuaDpsO7nz1-qmrqYKM3k",
authDomain: "pricehub-6d3c4.firebaseapp.com",
projectId: "pricehub-6d3c4",
storageBucket: "pricehub-6d3c4.firebasestorage.app",
messagingSenderId: "991179979836",
appId: "1:991179979836:web:cb23f4d31e55364d1ed739",
measurementId: "G-HLCHBX5FF7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.trackOrder = async function(){

const phone = document.getElementById("phone").value.trim();
const orderId = document.getElementById("orderId").value.trim();
const result = document.getElementById("result");

result.innerHTML = "";

if(!phone && !orderId){
result.innerHTML = "<p>اكتب رقم الهاتف أو رقم الطلب</p>";
return;
}

const snapshot = await getDocs(collection(db,"orders"));

let found = [];

snapshot.forEach((doc)=>{
const order = doc.data();

if(
(order.customerPhone || "").trim() === phone ||
(order.orderId || "").trim() === orderId
){
found.push(order);
}
});

if(found.length === 0){
result.innerHTML = "<p>لا يوجد طلب بهذا الرقم</p>";
return;
}

found.forEach(order=>{
result.innerHTML += `
<div class="order-card">
<strong>الحالة:</strong>

<span style="
padding:5px 10px;
border-radius:8px;
color:white;
background:
${(order.status || "جديد") === "تم التسليم"
? "#28a745"
: (order.status || "جديد") === "قيد المعالجة"
? "#ff9800"
: "#2196f3"};
">

${order.status || "جديد"}

</span>
<br>
<strong>المجموع:</strong> $${order.total || 0}
<br>
<strong>الكوبون:</strong> ${order.coupon || "لا يوجد"}
<br>
<strong>التاريخ:</strong> ${order.date || ""}
<br><br>
<strong>المنتجات:</strong>
<ul>
${(order.items || []).map(item => `
<li>${item.name} - $${item.price}</li>
`).join("")}
</ul>
</div>
`;
});

};
</script>

</body>
</html>
