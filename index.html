<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PriceHub</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<h1>PriceHub</h1>
<p>قارن الأسعار بين المتاجر</p>
</header>

<div id="favCount" onclick="openFavorites()">
❤️ المفضلة: 0
</div>

<div id="cartCount" onclick="openCart()">
🛒 السلة: 0
</div>
<button id="darkBtn" onclick="toggleDarkMode()">
🌙 الوضع الليلي
</button>
<div class="statsBox">

<div class="stat">
📦 المنتجات
<span id="statProducts">0</span>
</div>

<div class="stat">
❤️ المفضلة
<span id="statFavs">0</span>
</div>

<div class="stat">
🛒 السلة
<span id="statCart">0</span>
</div>

<div class="stat">
⭐ التقييم
<span id="statRating">0</span>
</div>

</div>
<div class="search">
<input
type="text"
id="search"
placeholder="ابحث عن منتج...">
</div>
<div class="sortBox">
<button onclick="sortLow()">الأرخص أولاً</button>
<button onclick="sortHigh()">الأغلى أولاً</button>
</div>
<div class="container" id="products">
</div>
<div class="filterBox">
<button onclick="filterCategory('all')">الكل</button>
<button onclick="filterCategory('phone')">الهواتف</button>
<button onclick="filterCategory('gaming')">الألعاب</button>
<button onclick="filterCategory('laptop')">اللابتوبات</button>
</div>
<div id="productCount">
عدد المنتجات: 0
</div>

<!-- نافذة تفاصيل المنتج -->

<div id="popup">

<div class="popup-content">

<h2 id="popupName"></h2>

<img id="popupImage">

<h3 id="popupPrice"></h3>

<div id="popupStores"></div>

<br>

<button onclick="closePopup()">
إغلاق
</button>

</div>

</div>

<div id="cartPopup">

<div class="popup-content">

<h2>🛒 السلة</h2>

<div id="cartItems"></div>

<h3 id="cartTotal"></h3>
<button onclick="clearCart()">
🗑️ تفريغ السلة
</button>

<button onclick="closeCart()">
إغلاق السلة
</button>

</div>

</div>
<div id="favPopup">

<div class="popup-content">

<h2>❤️ المفضلة</h2>

<div id="favItems"></div>

<button onclick="closeFavorites()">
إغلاق المفضلة
</button>

</div>

</div>
<div id="toast"></div>
<script type="module" src="firebase.js"></script>
<script src="script.js"></script>


</body>
</html>
