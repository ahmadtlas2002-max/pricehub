<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0066ff">

<title>PriceHub</title>

<link rel="stylesheet" href="style.css?v=45000">
<link rel="manifest" href="manifest.json">
</head>

<body>

<header>
<h1>PriceHub</h1>
<p>قارن الأسعار بين المتاجر</p>
</header>

<div id="featuredBox"></div>

<a href="admin.html">
<button style="width:90%;max-width:300px;display:block;margin:15px auto;background:#222;">
⚙️ لوحة الإدارة
</button>
</a>

<a href="track.html">
<button style="width:90%;max-width:300px;display:block;margin:10px auto;background:#008000;">
📦 تتبع الطلب
</button>
</a>

<a href="profile.html" id="loginBtn">
<button style="width:90%;max-width:300px;display:block;margin:10px auto;background:#673ab7;">
👤 حسابي
</button>
</a>

<a href="myorders.html">
<button style="width:90%;max-width:300px;display:block;margin:10px auto;background:#ff9800;">
📦 طلباتي
</button>
</a>

<button id="installBtn" style="width:90%;max-width:300px;display:block;margin:10px auto;background:#009688;color:white;">
📲 تثبيت PriceHub
</button>

<button onclick="toggleLanguage()" style="width:90%;max-width:300px;display:block;margin:10px auto;background:#555;color:white;">
🌍 عربي / English
</button>

<div id="userBox" style="width:90%;max-width:300px;margin:10px auto;background:white;padding:12px;border-radius:10px;text-align:center;font-weight:bold;">
👤 غير مسجل الدخول
</div>

<div id="favCount" onclick="openFavorites()">❤️ المفضلة: 0</div>
<div id="cartCount" onclick="openCart()">🛒 السلة: 0</div>

<button id="darkBtn" onclick="toggleDarkMode()">🌙 الوضع الليلي</button>

<div class="statsBox">

<div class="stat">📦 المنتجات <span id="statProducts">0</span></div>
<div class="stat">⭐ مميزة <span id="statFeatured">0</span></div>
<div class="stat">❤️ المفضلة <span id="statFavs">0</span></div>
<div class="stat">🛒 السلة <span id="statCart">0</span></div>
<div class="stat">⭐ التقييم <span id="statRating">0</span></div>
</div>

<div class="search">
<input type="text" id="search" placeholder="ابحث عن منتج...">
</div>

<div class="sortBox">
<button onclick="sortLow()">الأرخص أولاً</button>
<button onclick="sortHigh()">الأغلى أولاً</button>
</div>

<div class="filterBox">
<button onclick="filterCategory('all')">الكل</button>
<button onclick="filterCategory('phone')">الهواتف</button>
<button onclick="filterCategory('gaming')">الألعاب</button>
<button onclick="filterCategory('laptop')">اللابتوبات</button>
</div>

<div id="productCount">عدد المنتجات: 0</div>

<div id="compareBox">
<h2 style="text-align:center;">📊 مقارنة المنتجات</h2>
<select id="compare1"></select>
<select id="compare2"></select>
<button onclick="compareProducts()">مقارنة</button>
<button onclick="clearCompare()" style="background:#777;">مسح المقارنة</button>
<div id="compareResult"></div>
</div>

<div class="container" id="products"></div>

<div id="popup">
<div class="popup-content">
<h2 id="popupName"></h2>
<img id="popupImage">
<h3 id="popupPrice"></h3>
<div id="popupStores"></div>
<hr>

<h3>⭐ التقييمات</h3>

<div id="reviewsBox"></div>

<select id="reviewRating">
<option value="5">⭐⭐⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="2">⭐⭐</option>
<option value="1">⭐</option>
</select>

<textarea id="reviewText" placeholder="اكتب تعليقك" style="width:100%;height:80px;margin:10px 0;"></textarea>

<button onclick="addReview()">إرسال التقييم</button>
<br>
<button onclick="closePopup()">إغلاق</button>
</div>
</div>

<div id="cartPopup">
<div class="popup-content">
<h2>🛒 السلة</h2>
<div id="cartItems"></div>
<h3 id="cartTotal"></h3>

<input id="couponCode" placeholder="كود الخصم">
<button onclick="applyCoupon()">🎟️ تطبيق الكوبون</button>
<p id="couponMessage"></p>

<input id="customerName" placeholder="اسم العميل">
<input id="customerPhone" placeholder="رقم الهاتف">

<button onclick="checkout()">✅ تأكيد الطلب</button>
<button onclick="clearCart()">🗑️ تفريغ السلة</button>
<button onclick="closeCart()">إغلاق السلة</button>
</div>
</div>

<div id="favPopup">
<div class="popup-content">
<h2>❤️ المفضلة</h2>
<div id="favItems"></div>
<button onclick="closeFavorites()">إغلاق المفضلة</button>
</div>
</div>

<div id="toast"></div>

<script type="module" src="firebase.js?v=90000"></script>
<script src="script.js?v=90000"></script>
</body>
</html>
