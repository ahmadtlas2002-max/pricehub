```html
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلباتي - PriceHub</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
direction:rtl;
}

.box{
background:white;
max-width:700px;
margin:auto;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.order{
background:#eee;
padding:15px;
margin:10px 0;
border-radius:10px;
}

.status{
padding:5px 10px;
border-radius:8px;
color:white;
display:inline-block;
}
</style>
</head>

<body>

<div class="box">

<h1>📦 طلباتي</h1>

<a href="index.html">
<button>⬅️ العودة للرئيسية</button>
</a>

<div id="orders"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyA4jGrncraaaktuaDpsO7nz1-qmrqYKM3k",
authDomain: "pricehub-6d3c4.firebaseapp.com",
projectId: "pricehub-6d3c4",
storageBucket: "pricehub-6d3c4.firebasestorage.app",
messagingSenderId: "991179979836",
appId: "1:991179979836:web:cb23f4d31e55364d1ed739",
measurementId: "G-HLCHBX5FF7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth, async(user)=>{

const box = document.getElementById("orders");

if(!user){
box.innerHTML = "<h3>⚠️ يجب تسجيل الدخول أولاً</h3>";
return;
}

const snapshot = await getDocs(collection(db,"orders"));

let html = "";
let found = false;

snapshot.forEach(doc=>{

const order = doc.data();

if(order.customerEmail === user.email){

found = true;

let color = "#2196f3";

if(order.status === "قيد المعالجة"){
color = "#ff9800";
}

if(order.status === "تم التسليم"){
color = "#28a745";
}

html += `
<div class="order">

<h3>
<span class="status" style="background:${color}">
${order.status || "جديد"}
</span>
</h3>

<p>💰 المجموع: $${order.total || 0}</p>
<p>📅 التاريخ: ${order.date || ""}</p>

<h4>المنتجات:</h4>

<ul>
${(order.items || []).map(item =>
`<li>${item.name} - $${item.price}</li>`
).join("")}
</ul>

</div>
`;
}

});

if(!found){
html = "<h3>لا توجد طلبات مرتبطة بحسابك</h3>";
}

box.innerHTML = html;

});

</script>

</body>
</html>
```
