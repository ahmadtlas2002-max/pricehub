<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PriceHub Admin</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.admin-box{
background:white;
max-width:500px;
margin:auto;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,select,button{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#0066ff;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#0044cc;
}
</style>
</head>

<body>

<div class="admin-box">
<h1>لوحة إدارة PriceHub</h1>

<a href="index.html">
<button type="button">⬅️ العودة للموقع</button>
</a>

<input id="name" placeholder="اسم المنتج">
<input id="price" type="number" placeholder="السعر">
<input id="store" placeholder="اسم المتجر">
<input id="rating" type="number" step="0.1" placeholder="التقييم">

<select id="category">
<option value="phone">هواتف</option>
<option value="gaming">ألعاب</option>
<option value="laptop">لابتوبات</option>
</select>

<input id="image" placeholder="رابط الصورة">

<button id="saveBtn" onclick="saveProduct()">إضافة المنتج</button>

<button id="cancelBtn" onclick="cancelEdit()" style="display:none;background:#777;">
إلغاء التعديل
</button>

<p id="message"></p>

<hr>

<h2>المنتجات الحالية</h2>
<div id="productsList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA4jGrncraaaktuaDpsO7nz1-qmrqYKM3k",
authDomain: "pricehub-6d3c4.firebaseapp.com",
projectId: "pricehub-6d3c4",
storageBucket: "pricehub-6d3c4.firebasestorage.app",
messagingSenderId: "991179979836",
appId: "1:991179979836:web:cb23f4d31e55364d1ed739",
measurementId: "G-HLCHBX5FF7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let editingId = null;

window.saveProduct = async function(){

const name = document.getElementById("name").value;
const price = Number(document.getElementById("price").value);
const store = document.getElementById("store").value;
const rating = Number(document.getElementById("rating").value);
const category = document.getElementById("category").value;
const image = document.getElementById("image").value;

if(!name || !price || !rating || !image || !store){
document.getElementById("message").innerHTML = "املأ كل الحقول";
return;
}

if(rating < 0 || rating > 5){
document.getElementById("message").innerHTML = "التقييم يجب أن يكون بين 0 و 5";
return;
}

const productData = {
name,
price,
rating,
category,
image,
stores:[
store + " : $" + price
]
};

if(editingId){

await updateDoc(doc(db,"products",editingId),productData);

document.getElementById("message").innerHTML = "تم تحديث المنتج ✅";

editingId = null;

}else{

await addDoc(collection(db,"products"),productData);

document.getElementById("message").innerHTML = "تمت إضافة المنتج ✅";

}

clearForm();

loadAdminProducts();

};

function clearForm(){

document.getElementById("name").value = "";
document.getElementById("price").value = "";
document.getElementById("store").value = "";
document.getElementById("rating").value = "";
document.getElementById("image").value = "";

document.getElementById("saveBtn").innerHTML = "إضافة المنتج";
document.getElementById("cancelBtn").style.display = "none";

}

async function loadAdminProducts(){

const list = document.getElementById("productsList");
list.innerHTML = "";

const snapshot = await getDocs(collection(db,"products"));

snapshot.forEach((item)=>{

const product = item.data();

list.innerHTML += `
<div style="background:#eee;padding:10px;margin:8px 0;border-radius:8px;">
<strong>${product.name}</strong>
<br>
$${product.price}
<br>
<button onclick="editProduct('${item.id}','${product.name}',${product.price},${product.rating},'${product.category}','${product.image}')">
تعديل
</button>
<button onclick="deleteProduct('${item.id}')">
حذف
</button>
</div>
`;

});

}

window.editProduct = function(id,name,price,rating,category,image){

editingId = id;

document.getElementById("name").value = name;
document.getElementById("price").value = price;
document.getElementById("rating").value = rating;
document.getElementById("category").value = category;
document.getElementById("image").value = image;

document.getElementById("store").value = "Firebase Store";

document.getElementById("saveBtn").innerHTML = "تحديث المنتج";
document.getElementById("cancelBtn").style.display = "block";

document.getElementById("message").innerHTML = "✏️ وضع التعديل مفعل";

};

window.cancelEdit = function(){

editingId = null;

clearForm();

document.getElementById("message").innerHTML = "تم إلغاء التعديل";

};

window.deleteProduct = async function(id){

await deleteDoc(doc(db,"products",id));

document.getElementById("message").innerHTML = "تم حذف المنتج ✅";

loadAdminProducts();

};

loadAdminProducts();
</script>

</body>
</html>
