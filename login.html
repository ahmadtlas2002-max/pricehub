<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول - PriceHub</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
direction:rtl;
}

.box{
background:white;
max-width:450px;
margin:auto;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center;
}

input,button{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
box-sizing:border-box;
}

button{
background:#0066ff;
color:white;
border:none;
cursor:pointer;
}

.logout{
background:#cc0000;
}
</style>
</head>

<body>

<div class="box">
<h1>👤 حساب المستخدم</h1>

<a href="index.html">
<button type="button">⬅️ العودة للموقع</button>
</a>

<input id="email" type="email" placeholder="البريد الإلكتروني">
<input id="password" type="password" placeholder="كلمة المرور">

<button type="button" onclick="registerUser()">إنشاء حساب</button>
<button type="button" onclick="loginUser()">تسجيل الدخول</button>
<button type="button" onclick="resetPassword()" style="background:#ff9800;">🔑 نسيت كلمة المرور</button>
<button type="button" class="logout" onclick="logoutUser()">تسجيل الخروج</button>

<p id="message"></p>
<p id="userStatus">غير مسجل الدخول</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged,
sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyA4jGrncraaaktuaDpsO7nz1-qmrqYKM3k",
authDomain: "pricehub-6d3c4.firebaseapp.com",
projectId: "pricehub-6d3c4",
storageBucket: "pricehub-6d3c4.firebasestorage.app",
messagingSenderId: "991179979836",
appId: "1:991179979836:web:cb23f4d31e55364d1ed739",
measurementId: "G-HLCHBX5FF7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const message = document.getElementById("message");
const status = document.getElementById("userStatus");

function getEmail(){
return emailInput.value.trim();
}

function getPassword(){
return passwordInput.value.trim();
}

window.registerUser = async function(){
const email = getEmail();
const password = getPassword();

if(!email || !email.includes("@")){
message.innerHTML = "اكتب بريد إلكتروني صحيح";
return;
}

if(password.length < 6){
message.innerHTML = "كلمة المرور يجب أن تكون 6 أحرف على الأقل";
return;
}

try{
await createUserWithEmailAndPassword(auth,email,password);
message.innerHTML = "تم إنشاء الحساب ✅";
}catch(error){
message.innerHTML = error.message;
}
};

window.loginUser = async function(){
const email = getEmail();
const password = getPassword();

if(!email || !password){
message.innerHTML = "اكتب البريد وكلمة المرور";
return;
}

try{
await signInWithEmailAndPassword(auth,email,password);
message.innerHTML = "تم تسجيل الدخول ✅";
window.location.href = "profile.html";
}catch(error){
message.innerHTML = error.message;
}
};

window.logoutUser = async function(){
try{
await signOut(auth);
localStorage.removeItem("userEmail");
message.innerHTML = "تم تسجيل الخروج";
}catch(error){
message.innerHTML = error.message;
}
};

window.resetPassword = async function(){
const email = getEmail();

if(!email || !email.includes("@")){
message.innerHTML = "اكتب بريد إلكتروني صحيح";
return;
}

try{
await sendPasswordResetEmail(auth,email);
message.innerHTML = "تم إرسال رابط إعادة تعيين كلمة المرور ✅";
}catch(error){
message.innerHTML = error.message;
}
};

onAuthStateChanged(auth,function(user){
if(user){
localStorage.setItem("userEmail", user.email);
status.innerHTML = "مسجل الدخول: " + user.email;
}else{
localStorage.removeItem("userEmail");
status.innerHTML = "غير مسجل الدخول";
}
});
</script>

</body>
</html>
